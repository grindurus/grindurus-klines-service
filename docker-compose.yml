# docker-compose.yml
# $ docker compose up -d --build

version: "3.9"

name: klines-service

services:
  db:
    image: timescale/timescaledb:latest-pg16 # Note: check if pg18 is available, usually 16 is current stable
    container_name: klines-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/home/postgres/data
    networks:
      - grindurus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build: .
    container_name: klines-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app
    labels:
      - traefik.enable=true
      - traefik.docker.network=grindurus
      # --- localhost (HTTP only) ---
      - traefik.http.routers.api-local.rule=Host(`klines.localhost`)
      - traefik.http.routers.api-local.entrypoints=web

      # --- prod HTTP → HTTPS redirect ---
      - traefik.http.routers.api-http.rule=Host(`klines.grindurus.xyz`)
      - traefik.http.routers.api-http.entrypoints=web
      - traefik.http.routers.api-http.middlewares=redirect-to-https

      # --- prod HTTPS с сертификатом ---
      - traefik.http.routers.api.rule=Host(`klines.grindurus.xyz`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le

      # --- общий бэкенд ---
      - traefik.http.services.api.loadbalancer.server.port=8000
    networks:
      - grindurus
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

networks:
  grindurus:
    external: true